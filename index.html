<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustainable IT Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header">
        <h1>Green Computing Guide</h1>
        <p>Learn how to reduce your digital footprint with simple actions.</p>
        <button id="boton1">Eco Mode (Save Energy)</button>
    </header>

    <section>
        <h2>1. Software Efficiency</h2>
        <p id="software-status">Current Status: Standard Code (High resource usage)</p>
        <button id="boton2">Optimize Code</button>
    </section>

    <section>
        <h2>2. Hardware Life Cycle</h2>
        <div class="card">
            <img id="device-img" src="https://cdn-icons-png.flaticon.com/128/3649/3649238.png" width="60" alt="Old PC">
            <p id="device-desc">Broken Hardware</p>
            <button id="boton3">Repair & Reuse</button>
        </div>
    </section>

    <section>
        <h2>3. Green Habits</h2>
        <p id="habits">A list with sustainable habit</p>
        <button id="boton4">Show list</button>
        <ul id="habit-list"></ul>
    </section>

    <section id="cloud-section">
        <h2>4. Cloud Tip</h2>
        <div id="hover-box" style="border: 2px dashed #27ae60; padding: 10px; cursor: pointer;">
            <button id="boton5">Press here to see a secret tip!</button>
        </div>
    </section>

<button id="boton6">Delete p from the body</button>

    <script src="app.js"></script>
</body>
</html>
